name: Daily Stock Scraping

on:
  schedule:
    # 毎日 日本時間 深夜 2:00 (UTC 17:00) に実行
    - cron: '0 17 * * *'
  workflow_dispatch: # 手動実行ボタンを出す

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scraping script
        env:
          # 後で設定する「秘密の鍵」をPythonに渡す設定です
          BASIC_USER: ${{ secrets.BASIC_USER }}
          BASIC_PASS: ${{ secrets.BASIC_PASS }}
        run: python -u cross.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add yutai_database_ALL.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update yutai data: $(date +'%Y-%m-%d')" && git push)
