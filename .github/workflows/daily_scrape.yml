name: Daily Stock Scraping

on:
  workflow_dispatch: # 手動実行用ボタン
  schedule:
    # 毎日 日本時間 深夜2:10（UTC 17:10）にワークフローを開始
    # ここから下の「ランダム待機」ステップで実際の開始時間をバラけさせます
    - cron: '10 17 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: 🎲 ランダム待機 (0〜6600秒 / 最大110分)
        # 毎日同じ時間にアクセスしないように、開始時間をランダムに遅らせます
        # 2:10に起動 + 最大110分待機 ＝ 深夜2:10〜4:00の間にランダムで実行開始
        run: sleep $(( RANDOM % 6600 ))

      - name: Run scraping script
        env:
          BASIC_USER: ${{ secrets.BASIC_USER }}
          BASIC_PASS: ${{ secrets.BASIC_PASS }}
          PYTHONUNBUFFERED: 1
        run: python -u cross.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add yutai_database_ALL.csv
          git commit -m "Auto-update yutai data" || echo "No changes to commit"
          git push

      - name: 📂 FTPでサーバーにCSVをアップロード
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        # ⚠️ /www/ の部分はサーバーのパスに合わせて変更してください
        run: |
          curl -T yutai_database_ALL.csv ftp://$FTP_SERVER/www/yutai_database_ALL.csv --user "$FTP_USER:$FTP_PASS"
