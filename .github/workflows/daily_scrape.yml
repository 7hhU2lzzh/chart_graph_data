name: Daily Stock Scraping

on:
  workflow_dispatch:
  schedule:
    - cron: '10 17 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests

      - name: 🎲 ランダム待機 (自動実行時のみ 0〜110分)
        if: github.event_name == 'schedule'
        run: sleep $(( RANDOM % 60 ))

      - name: Run scraping script
        env:
          BASIC_USER: ${{ secrets.BASIC_USER }}
          BASIC_PASS: ${{ secrets.BASIC_PASS }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
          PYTHONUNBUFFERED: 1
        run: python -u cross.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add yutai_database_ALL.csv
          git commit -m "auto: update yutai data" || echo "No changes to commit"
          git push
